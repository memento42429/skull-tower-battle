<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>頭骨タワーバトル — 路上博物館</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1208;
    --ground:    #3d2b1a;
    --accent:    #c8a96e;
    --bone:      #e8e0d0;
    --bone-dark: #b8a890;
    --panel:     #221a0e;
    --border:    #5a4020;
  }

  body {
    background: var(--bg);
    color: var(--bone);
    font-family: 'IM Fell English', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  header {
    width: 100%;
    max-width: 480px;
    padding: 18px 20px 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1.2;
  }

  header p {
    font-size: 0.72rem;
    font-family: monospace;
    color: var(--bone-dark);
    letter-spacing: 0.15em;
    margin-top: 4px;
    font-style: italic;
  }

  #game-wrapper {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px 10px;
    max-width: 520px;
    width: 100%;
  }

  #canvas-container {
    position: relative;
    flex-shrink: 0;
  }

  canvas {
    display: block;
    border: 1px solid var(--border);
    cursor: crosshair;
  }

  #ruler {
    position: absolute;
    left: -22px;
    top: 0;
    height: 100%;
    width: 20px;
    display: flex;
    flex-direction: column-reverse;
    justify-content: space-between;
    pointer-events: none;
  }
  .ruler-mark {
    font-family: monospace;
    font-size: 8px;
    color: var(--border);
    text-align: right;
    line-height: 1;
  }

  #side-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 110px;
  }

  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px;
  }

  .panel-label {
    font-family: monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  #score-display {
    font-size: 2rem;
    color: var(--bone);
    line-height: 1;
  }

  #height-display {
    font-family: monospace;
    font-size: 0.9rem;
    color: var(--bone-dark);
  }

  #next-card {
    position: relative;
    overflow: hidden;
  }

  #next-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 8px,
      rgba(200,169,110,0.03) 8px,
      rgba(200,169,110,0.03) 9px
    );
  }

  #next-skull-canvas {
    display: block;
    margin: 6px auto;
  }

  #next-name-jp {
    font-size: 0.85rem;
    color: var(--bone);
    text-align: center;
    margin-top: 4px;
  }

  #next-name-sci {
    font-size: 0.6rem;
    font-style: italic;
    color: var(--bone-dark);
    text-align: center;
    font-family: 'IM Fell English', serif;
    margin-top: 2px;
  }

  #next-weight {
    font-family: monospace;
    font-size: 0.6rem;
    color: var(--accent);
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.1em;
  }

  #drop-guide {
    position: absolute;
    top: 0;
    width: 1px;
    background: rgba(200,169,110,0.3);
    pointer-events: none;
    border-left: 1px dashed rgba(200,169,110,0.4);
  }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,4,0.88);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
    z-index: 100;
  }
  #overlay.visible { display: flex; }

  #overlay h2 {
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  #overlay .result-score {
    font-family: monospace;
    font-size: 1rem;
    color: var(--bone);
    letter-spacing: 0.1em;
  }

  #species-card {
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 16px 24px;
    max-width: 260px;
    text-align: center;
  }
  #species-card .sp-label {
    font-family: monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    margin-bottom: 8px;
    display: block;
  }
  #species-card .sp-name {
    font-size: 1.1rem;
    color: var(--bone);
  }
  #species-card .sp-sci {
    font-size: 0.7rem;
    font-style: italic;
    color: var(--bone-dark);
    margin-top: 4px;
  }
  #species-card .sp-fact {
    font-size: 0.72rem;
    color: var(--bone-dark);
    margin-top: 10px;
    line-height: 1.6;
    font-family: monospace;
  }

  #restart-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'IM Fell English', serif;
    font-size: 1rem;
    padding: 10px 32px;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: background 0.2s;
  }
  #restart-btn:hover { background: rgba(200,169,110,0.15); }

  footer {
    font-family: monospace;
    font-size: 0.6rem;
    color: var(--border);
    letter-spacing: 0.15em;
    padding: 16px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>頭骨タワーバトル</h1>
  <p>SKULL TOWER — 路上博物館 prototype v0.1</p>
</header>

<div id="game-wrapper">
  <div id="canvas-container">
    <div id="ruler"></div>
    <canvas id="gameCanvas" width="280" height="480"></canvas>
    <div id="drop-guide"></div>
  </div>

  <div id="side-panel">
    <div class="panel-box">
      <span class="panel-label">Score</span>
      <div id="score-display">0</div>
    </div>
    <div class="panel-box">
      <span class="panel-label">Height</span>
      <div id="height-display">0 cm</div>
    </div>
    <div class="panel-box" id="next-card">
      <span class="panel-label">Next</span>
      <canvas id="next-skull-canvas" width="80" height="64"></canvas>
      <div id="next-name-jp">—</div>
      <div id="next-name-sci">—</div>
      <div id="next-weight">—</div>
    </div>
  </div>
</div>

<div id="overlay">
  <h2>COLLAPSED</h2>
  <div class="result-score" id="final-score-text"></div>
  <div id="species-card">
    <span class="sp-label">LAST SPECIMEN</span>
    <div class="sp-name" id="sp-name-jp"></div>
    <div class="sp-sci" id="sp-name-sci"></div>
    <div class="sp-fact" id="sp-fact"></div>
  </div>
  <button id="restart-btn" onclick="restartGame()">もう一度 / RETRY</button>
</div>

<footer>
  一般社団法人路上博物館 — 標本データを用いた教育ゲームプロトタイプ
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const SKULLS = [
  { id:'mouse',  nameJp:'ハツカネズミ', nameSci:'Mus musculus',             weight:0.4,  fact:'歯の咬合面が特徴的。門歯は一生伸び続ける。', color:'#d4c8b0', verts:makeEllipseVerts(16,11),    scale:1.0 },
  { id:'rabbit', nameJp:'ニホンノウサギ',nameSci:'Lepus brachyurus',        weight:1.8,  fact:'眼窩が非常に大きく、広い視野を持つ。',       color:'#cfc4aa', verts:makeEllipseVerts(18,13),    scale:1.0 },
  { id:'cat',    nameJp:'イエネコ',     nameSci:'Felis catus',              weight:3.5,  fact:'短い吻部と大きな脳函が特徴。',               color:'#c8bca0', verts:makeRoundedRectVerts(19,14), scale:1.0 },
  { id:'fox',    nameJp:'キツネ',       nameSci:'Vulpes vulpes',            weight:5.0,  fact:'長い吻部が嗅覚の発達を示す。',               color:'#c0b498', verts:makeElongatedVerts(22,12),   scale:1.0 },
  { id:'tanuki', nameJp:'タヌキ',       nameSci:'Nyctereutes procyonoides', weight:6.0,  fact:'雑食性で知られ、犬歯はそれほど大きくない。', color:'#b8ac90', verts:makeRoundedRectVerts(21,15), scale:1.0 },
  { id:'deer',   nameJp:'ニホンジカ',   nameSci:'Cervus nippon',            weight:60,   fact:'角は毎年生え変わる。頭骨は縦長で吻が長い。', color:'#b0a488', verts:makeElongatedVerts(23,13),   scale:1.0 },
  { id:'boar',   nameJp:'イノシシ',     nameSci:'Sus scrofa',               weight:80,   fact:'発達した犬歯（牙）が特徴。',                 color:'#a89c80', verts:makeElongatedVerts(23,14),   scale:1.0 },
];

function makeEllipseVerts(w, h, n=16) {
  const verts = [];
  for (let i=0;i<n;i++){const a=(i/n)*Math.PI*2;verts.push({x:Math.cos(a)*w/2,y:Math.sin(a)*h/2});}
  return verts;
}
function makeRoundedRectVerts(w, h) {
  const r=Math.min(w,h)*0.25,verts=[];
  const corners=[[w/2-r,-h/2],[w/2,-h/2+r],[w/2,h/2-r],[w/2-r,h/2],[-w/2+r,h/2],[-w/2,h/2-r],[-w/2,-h/2+r],[-w/2+r,-h/2]];
  for(let i=0;i<corners.length;i++){const[cx,cy]=corners[i],[nx,ny]=corners[(i+1)%corners.length];verts.push({x:cx,y:cy},{x:(cx+nx)/2,y:(cy+ny)/2});}
  return verts;
}
function makeElongatedVerts(w, h) {
  const verts=[],steps=20;
  for(let i=0;i<steps;i++){const t=i/steps,a=t*Math.PI*2;const rx=(a<Math.PI)?w/2*(0.5+0.5*Math.cos(a-Math.PI)):w/2;verts.push({x:Math.cos(a)*rx,y:Math.sin(a)*h/2});}
  return verts;
}

const { Engine, Bodies, Body, Composite } = Matter;

const CANVAS_W = 280, CANVAS_H = 480;
const GROUND_Y = CANVAS_H - 30; // 旧床（参照用）
const WALL_T   = 40;
const ISLAND_Y = Math.round(CANVAS_H * 0.77); // 島のY座標
const ISLAND_W = 200;                          // 島の幅
const ISLAND_T = 12;                           // 島の厚さ
const DROP_Y   = 40;

let engine, world, currentBody, currentSkull, nextSkull;
let score = 0, dropX = CANVAS_W/2, isDropping = false, gameOver = false;
let placedBodies = [], lastCollapseSkull = null;

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-skull-canvas');
const nextCtx    = nextCanvas.getContext('2d');
const dropGuide  = document.getElementById('drop-guide');

function initEngine() {
  engine = Engine.create({ gravity: { y: 1.2 } });
  world  = engine.world;
  const island = Bodies.rectangle(CANVAS_W/2, ISLAND_Y, ISLAND_W, ISLAND_T, {isStatic:true, label:'island', friction:50, restitution:0.0});
  const islandTop = Bodies.rectangle(CANVAS_W/2, ISLAND_Y - ISLAND_T/2, ISLAND_W, 2, {isStatic:true, label:'island', friction:50, frictionStatic:50, restitution:0.0});
  Composite.add(world, [island, islandTop]);
  placedBodies=[]; currentBody=null; score=0; gameOver=false; isDropping=false; lastCollapseSkull=null;
  updateScore(0);
}

function pickRandomSkull() { return SKULLS[Math.floor(Math.random()*SKULLS.length)]; }
function getBodyScale(skull) { return skull.scale * 1.8; }

function createSkullBody(skull, x, y) {
  const s = getBodyScale(skull);
  const scaledVerts = skull.verts.map(v=>({x:v.x*s,y:v.y*s}));
  const body = Bodies.fromVertices(x, y, scaledVerts, {
    restitution:0.2, friction:0.6, frictionAir:0.05, density:0.05, label:skull.id,
  });
  body.skullData = skull;
  return body;
}

function spawnNext() {
  if (!nextSkull) nextSkull = pickRandomSkull();
  currentSkull = nextSkull;
  nextSkull    = pickRandomSkull();
  currentBody  = createSkullBody(currentSkull, dropX, DROP_Y);
  Body.setStatic(currentBody, true);
  Composite.add(world, currentBody);
  isDropping = false;
  updateNextCard();
}

function dropCurrent() {
  if (!currentBody || isDropping || gameOver) return;
  Body.setStatic(currentBody, false);
  isDropping = true;
  const checkRest = setInterval(()=>{
    if (!currentBody){clearInterval(checkRest);return;}
    const speed = Math.sqrt(currentBody.velocity.x**2+currentBody.velocity.y**2);
    if (speed < 0.3 && isDropping) {
      placedBodies.push(currentBody); currentBody=null; clearInterval(checkRest);
      updateScore(score + Math.round(currentSkull.weight*10+5));
      lastCollapseSkull = currentSkull;
      setTimeout(()=>{ if(!gameOver) spawnNext(); }, 300);
    }
  }, 100);
}

function updateScore(s) { score=s; document.getElementById('score-display').textContent=score; }

function updateNextCard() {
  const s = nextSkull;
  document.getElementById('next-name-jp').textContent  = s.nameJp;
  document.getElementById('next-name-sci').textContent = s.nameSci;
  document.getElementById('next-weight').textContent   = `体重目安 ${s.weight} kg`;
  nextCtx.clearRect(0,0,80,64);
  drawSkullShape(nextCtx, s, 40, 32, 1.0);
}

function drawSkullShape(c, skull, cx, cy, scale) {
  const s = getBodyScale(skull)*scale*0.5;
  const verts = skull.verts.map(v=>({x:cx+v.x*s,y:cy+v.y*s}));
  c.save();
  c.beginPath(); c.moveTo(verts[0].x,verts[0].y);
  for(let i=1;i<verts.length;i++) c.lineTo(verts[i].x,verts[i].y);
  c.closePath();
  c.fillStyle=skull.color; c.shadowColor='rgba(200,169,110,0.2)'; c.shadowBlur=6; c.fill();
  c.strokeStyle='rgba(200,169,110,0.5)'; c.lineWidth=0.8; c.stroke();
  c.restore();
}

function drawFrame() {
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  const grad=ctx.createLinearGradient(0,0,0,CANVAS_H);
  grad.addColorStop(0,'#0e0b06'); grad.addColorStop(1,'#1a1208');
  ctx.fillStyle=grad; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  ctx.strokeStyle='rgba(90,64,32,0.3)'; ctx.lineWidth=0.5;
  for(let y=GROUND_Y;y>0;y-=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CANVAS_W,y);ctx.stroke();}

  // 島の描画
  ctx.fillStyle='#3d2b1a';
  ctx.fillRect(CANVAS_W/2 - ISLAND_W/2, ISLAND_Y - ISLAND_T/2, ISLAND_W, ISLAND_T);
  ctx.fillStyle='#5a4020';
  ctx.fillRect(CANVAS_W/2 - ISLAND_W/2, ISLAND_Y - ISLAND_T/2, ISLAND_W, 2);

  const bodies = Composite.allBodies(world);
  for(const body of bodies){
    if(body.label==='island'||body.label==='wall') continue;
    const verts=body.vertices;
    ctx.save();
    ctx.beginPath(); ctx.moveTo(verts[0].x,verts[0].y);
    for(let i=1;i<verts.length;i++) ctx.lineTo(verts[i].x,verts[i].y);
    ctx.closePath();
    const skull=body.skullData||{};
    ctx.fillStyle=skull.color||'#d0c4a8';
    if(body===currentBody){ctx.shadowColor='rgba(200,169,110,0.6)';ctx.shadowBlur=12;}
    ctx.fill();
    ctx.strokeStyle='rgba(200,169,110,0.4)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.restore();
  }

  if(placedBodies.length>0){
    let minY=GROUND_Y;
    for(const b of placedBodies){if(b.bounds.min.y<minY) minY=b.bounds.min.y;}
    document.getElementById('height-display').textContent=Math.round((GROUND_Y-minY)*0.5)+' cm';
  }

  if(!gameOver){
    for(const b of placedBodies){
      if(b.position.y > ISLAND_Y + 60 || b.position.y > CANVAS_H){triggerGameOver();break;}
    }
    if(!gameOver && currentBody && currentBody.position.y > CANVAS_H){triggerGameOver();}
  }
}

function triggerGameOver() {
  gameOver=true;
  const skull=lastCollapseSkull||SKULLS[0];
  document.getElementById('final-score-text').textContent=`SCORE: ${score} pt`;
  document.getElementById('sp-name-jp').textContent  = skull.nameJp;
  document.getElementById('sp-name-sci').textContent = skull.nameSci;
  document.getElementById('sp-fact').textContent     = skull.fact;
  document.getElementById('overlay').classList.add('visible');
}

canvas.addEventListener('mousemove',(e)=>{
  if(isDropping||gameOver) return;
  const rect=canvas.getBoundingClientRect();
  dropX=Math.max(20,Math.min(CANVAS_W-20,e.clientX-rect.left));
  if(currentBody) Body.setPosition(currentBody,{x:dropX,y:DROP_Y});
  dropGuide.style.left=dropX+'px'; dropGuide.style.height=CANVAS_H+'px'; dropGuide.style.display='block';
});
canvas.addEventListener('click',()=>{ dropCurrent(); });
canvas.addEventListener('touchmove',(e)=>{
  e.preventDefault();
  if(isDropping||gameOver) return;
  const rect=canvas.getBoundingClientRect();
  dropX=Math.max(20,Math.min(CANVAS_W-20,e.touches[0].clientX-rect.left));
  if(currentBody) Body.setPosition(currentBody,{x:dropX,y:DROP_Y});
},{passive:false});
canvas.addEventListener('touchend',()=>{ dropCurrent(); });

function buildRuler() {
  const ruler=document.getElementById('ruler'); ruler.innerHTML='';
  for(let y=GROUND_Y;y>=0;y-=80){
    const mark=document.createElement('div');
    mark.className='ruler-mark'; mark.style.position='absolute';
    mark.style.bottom=(100-y/CANVAS_H*100)+'%';
    mark.textContent=Math.round((GROUND_Y-y)*0.5);
    ruler.appendChild(mark);
  }
}

let lastTime=0;
function loop(time){
  const delta=time-lastTime; lastTime=time;
  Engine.update(engine,Math.min(delta,33));
  drawFrame();
  requestAnimationFrame(loop);
}

function restartGame(){
  document.getElementById('overlay').classList.remove('visible');
  Composite.clear(world,false); initEngine();
  nextSkull=pickRandomSkull(); spawnNext();
  document.getElementById('height-display').textContent='0 cm';
}

initEngine(); buildRuler();
nextSkull=pickRandomSkull(); spawnNext();
requestAnimationFrame(loop);
</script>
</body>
</html>
